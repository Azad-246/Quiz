<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Your Study - Quiz Portal</title>
    <style>
        :root {
            --primary: #3B4CCA; 
            --primary-hover: #2a3799;
            --bg-color: #F3F4F6;
            --card-bg: #FFFFFF;
            --text-main: #1F2937;
            --text-muted: #6B7280;
            --correct: #10B981;
            --wrong: #EF4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Main Container */
        .main-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 20px;
        }

        .quiz-container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 650px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            overflow: hidden;
            position: relative;
        }

        /* Header */
        .header {
            background-color: var(--primary);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
            font-weight: 700;
        }

        .meta-info {
            font-size: 13px;
            background: rgba(255, 255, 255, 0.2);
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            letter-spacing: 0.5px;
        }

        /* Home / Selection Screen */
        .home-screen {
            padding: 35px 30px;
            text-align: center;
        }

        .home-screen h2 {
            margin-bottom: 25px;
            color: var(--text-main);
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-main);
        }

        select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #E5E7EB;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
            cursor: pointer;
            background-color: white;
        }

        select:focus {
            border-color: var(--primary);
        }

        .btn-start {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px 30px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
            margin-top: 10px;
        }

        .btn-start:hover:not(:disabled) {
            background-color: var(--primary-hover);
        }

        .btn-start:disabled {
            background-color: #9CA3AF;
            cursor: not-allowed;
        }

        /* Quiz Content */
        .content {
            padding: 30px 25px;
        }

        .timer-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 2px solid #F3F4F6;
            padding-bottom: 15px;
        }

        .timer {
            font-size: 20px;
            font-weight: bold;
            color: var(--primary);
            background: #EEF2FF;
            padding: 6px 16px;
            border-radius: 8px;
            border: 2px solid var(--primary);
        }

        .question {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option {
            background-color: #F9FAFB;
            border: 2px solid #E5E7EB;
            padding: 14px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .option:hover {
            border-color: var(--primary);
            background-color: #EEF2FF;
        }

        .option.correct {
            background-color: var(--correct);
            border-color: var(--correct);
            color: white;
        }

        .option.wrong {
            background-color: var(--wrong);
            border-color: var(--wrong);
            color: white;
        }

        .option.disabled {
            pointer-events: none;
        }

        .loading-screen {
            text-align: center;
            padding: 40px;
            font-size: 16px;
            color: var(--text-muted);
        }

        /* Slim Footer Section */
        footer {
            width: 100%;
            background-color: #1F2937;
            color: #D1D5DB;
            text-align: center;
            padding: 10px 15px; 
            margin-top: auto;
            font-size: 12px; 
        }

        footer h3 {
            color: white;
            margin-bottom: 4px;
            font-size: 14px;
            font-weight: 600;
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 4px 0;
        }

        .social-icons a {
            color: #D1D5DB;
            text-decoration: none;
            transition: color 0.2s;
        }

        .social-icons a:hover {
            color: white;
        }

        .social-icons svg {
            width: 16px; 
            height: 16px;
            fill: currentColor;
        }

        .copyright {
            margin-top: 4px;
            opacity: 0.8;
        }

        @media (max-width: 480px) {
            .content, .home-screen {
                padding: 20px 15px;
            }
            .question {
                font-size: 18px;
            }
            .option {
                padding: 12px;
                font-size: 15px;
            }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="quiz-container">
            <div class="header">
                <h1>Search Your Study</h1>
                <div class="meta-info" id="top-meta-info" style="display: none;">
                    Class: <span id="class-display">--</span> | Subject: <span id="subject-display">--</span>
                </div>
            </div>

            <div class="home-screen" id="home-screen" style="display: none;">
                <h2>Start Your Test</h2>
                
                <div class="form-group">
                    <label for="class-select">Select Your Class</label>
                    <select id="class-select">
                        <option value="">-- Choose Class --</option>
                        </select>
                </div>

                <div class="form-group" id="subject-group" style="display: none;">
                    <label for="subject-select">Select Subject</label>
                    <select id="subject-select">
                        <option value="">-- Choose Subject --</option>
                        </select>
                </div>

                <button class="btn-start" id="start-btn" disabled>Start Quiz</button>
            </div>

            <div class="content" id="quiz-content" style="display: none;">
                <div class="timer-container">
                    <span style="font-weight: 600; color: var(--text-muted);">Time Left:</span>
                    <div class="timer" id="timer">10s</div>
                </div>
                
                <div class="question" id="question-text">Question will appear here...</div>
                
                <div class="options" id="options-container">
                    </div>
            </div>

            <div class="loading-screen" id="loading-screen">
                Connecting to Database...
            </div>
        </div>
    </div>

    <footer>
        <h3>Search Your Study</h3>
        <div class="social-icons">
            <a href="#" target="_blank" title="YouTube">
                <svg viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
            </a>
            <a href="#" target="_blank" title="Telegram">
                <svg viewBox="0 0 24 24"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.894 8.221l-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.446 1.394c-.14.18-.357.295-.6.295-.002 0-.003 0-.005 0l.213-3.054 5.56-5.022c.24-.213-.054-.334-.373-.121l-6.869 4.326-2.96-.924c-.64-.203-.658-.64.135-.954l11.566-4.458c.538-.196 1.006.128.832.94z"/></svg>
            </a>
            <a href="#" target="_blank" title="Facebook">
                <svg viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
            </a>
        </div>
        <div class="copyright">
            &copy; <span id="year"></span> All Rights Reserved.
        </div>
    </footer>

    <script>
        document.getElementById('year').innerText = new Date().getFullYear();

        // CACHE-BUSTING URL: Pichla data ignore karega aur hamesha naya data layega
        const FIREBASE_URL = "https://device-streaming-b2a3209f-default-rtdb.firebaseio.com/.json?timestamp=" + new Date().getTime();
        
        const homeScreen = document.getElementById('home-screen');
        const quizContent = document.getElementById('quiz-content');
        const loadingScreen = document.getElementById('loading-screen');
        const classSelect = document.getElementById('class-select');
        const subjectSelect = document.getElementById('subject-select');
        const subjectGroup = document.getElementById('subject-group');
        const startBtn = document.getElementById('start-btn');
        const topMetaInfo = document.getElementById('top-meta-info');
        const classDisplay = document.getElementById('class-display');
        const subjectDisplay = document.getElementById('subject-display');
        const timerDisplay = document.getElementById('timer');
        const questionText = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');

        let dbData = null;
        let allQuestions = [];
        let currentClass = "";
        let currentSubject = "";
        let currentQuestion = null;
        let timerInterval;
        let timeLeft = 10;
        let timeElapsed = 0;
        let isAnswered = false;

        // 1. Live Data Fetching
        async function fetchDatabase() {
            try {
                // Fetching fresh data avoiding browser cache
                const response = await fetch(FIREBASE_URL, { cache: 'no-store' });
                dbData = await response.json();
                
                classSelect.innerHTML = '<option value="">-- Choose Class --</option>'; // Clear old options
                
                if (dbData && dbData.quiz_data) {
                    const classes = Object.keys(dbData.quiz_data);
                    
                    classes.forEach(cls => {
                        const option = document.createElement('option');
                        option.value = cls;
                        // Format auto adjust (e.g. class_10 -> CLASS 10)
                        option.textContent = cls.replace(/_/g, ' ').toUpperCase();
                        classSelect.appendChild(option);
                    });

                    loadingScreen.style.display = 'none';
                    homeScreen.style.display = 'block';
                } else {
                    loadingScreen.innerText = "No data found in database!";
                }
            } catch (error) {
                console.error("Error fetching data: ", error);
                loadingScreen.innerText = "Error connecting to Database.";
            }
        }

        // 2. Auto-Detect Subjects on Class Change
        classSelect.addEventListener('change', (e) => {
            currentClass = e.target.value;
            subjectSelect.innerHTML = '<option value="">-- Choose Subject --</option>'; // Clear previous subjects
            
            if (currentClass && dbData.quiz_data[currentClass] && dbData.quiz_data[currentClass].subject) {
                const subjects = Object.keys(dbData.quiz_data[currentClass].subject);
                
                subjects.forEach(sub => {
                    const option = document.createElement('option');
                    option.value = sub;
                    // Capitalize first letter
                    option.textContent = sub.charAt(0).toUpperCase() + sub.slice(1);
                    subjectSelect.appendChild(option);
                });
                
                subjectGroup.style.display = 'block';
            } else {
                subjectGroup.style.display = 'none';
            }
            startBtn.disabled = true;
        });

        // 3. Enable Start Button
        subjectSelect.addEventListener('change', (e) => {
            currentSubject = e.target.value;
            if (currentSubject) {
                startBtn.disabled = false;
            } else {
                startBtn.disabled = true;
            }
        });

        // 4. Check Empty Question and Start Quiz
        startBtn.addEventListener('click', () => {
            let rawQuestions = dbData.quiz_data[currentClass].subject[currentSubject];
            
            if (!rawQuestions) {
                alert("डेटाबेस में प्रश्न नहीं हैं!"); 
                return;
            }

            if (Array.isArray(rawQuestions)) {
                allQuestions = rawQuestions.filter(q => q !== null);
            } else {
                allQuestions = Object.values(rawQuestions).filter(q => q !== null);
            }

            if (allQuestions.length === 0) {
                alert("डेटाबेस में प्रश्न नहीं हैं!"); 
                return;
            }

            homeScreen.style.display = 'none';
            topMetaInfo.style.display = 'inline-block';
            
            classDisplay.innerText = currentClass.replace(/_/g, ' ').toUpperCase();
            subjectDisplay.innerText = currentSubject.charAt(0).toUpperCase() + currentSubject.slice(1);
            
            loadNextQuestion();
        });

        // 5. Load Next Question Logic
        function loadNextQuestion() {
            if (allQuestions.length === 0) {
                alert("Quiz Completed!");
                location.reload();
                return;
            }

            quizContent.style.display = 'none';
            loadingScreen.style.display = 'block';
            loadingScreen.innerText = "Loading question...";

            const randomIndex = Math.floor(Math.random() * allQuestions.length);
            currentQuestion = allQuestions[randomIndex];
            
            allQuestions.splice(randomIndex, 1);

            questionText.innerText = currentQuestion.question;

            optionsContainer.innerHTML = '';
            const optionsObj = currentQuestion.options;
            
            for (const key in optionsObj) {
                const btn = document.createElement('div');
                btn.className = 'option';
                btn.innerText = key + ". " + optionsObj[key]; 
                btn.dataset.key = key; 
                btn.onclick = () => handleOptionClick(key, btn);
                optionsContainer.appendChild(btn);
            }

            isAnswered = false;
            timeLeft = 10;
            timeElapsed = 0;
            timerDisplay.innerText = timeLeft + 's';
            
            loadingScreen.style.display = 'none';
            quizContent.style.display = 'block';

            startTimer();
        }

        // 6. 10 Second Timer
        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (isAnswered) {
                    clearInterval(timerInterval);
                    return;
                }

                timeLeft--;
                timeElapsed++;
                timerDisplay.innerText = timeLeft + 's';

                if (timeElapsed === 7 && !isAnswered) {
                    showCorrectAnswer();
                }

                if (timeElapsed >= 10) {
                    clearInterval(timerInterval);
                    loadNextQuestion();
                }
            }, 1000);
        }

        // 7. Answer Selection Logic
        function handleOptionClick(selectedKey, btnElement) {
            if (isAnswered || timeElapsed >= 7) return; 
            isAnswered = true;
            clearInterval(timerInterval); 

            const options = document.querySelectorAll('.option');
            options.forEach(opt => opt.classList.add('disabled'));

            if (selectedKey === currentQuestion.correct_option) {
                btnElement.classList.add('correct');
            } else {
                btnElement.classList.add('wrong');
                const correctBtn = document.querySelector(`.option[data-key="${currentQuestion.correct_option}"]`);
                if(correctBtn) correctBtn.classList.add('correct');
            }

            setTimeout(() => {
                loadNextQuestion();
            }, 3000);
        }

        function showCorrectAnswer() {
            const options = document.querySelectorAll('.option');
            options.forEach(opt => opt.classList.add('disabled'));
            
            const correctBtn = document.querySelector(`.option[data-key="${currentQuestion.correct_option}"]`);
            if(correctBtn) correctBtn.classList.add('correct');
        }

        // Fetch Live Data when the page completely loads
        window.onload = fetchDatabase;
    </script>
</body>
</html>
